name: Build, Test, and Deploy to EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app

jobs:
  # -------------------------
  # 1. TEST STAGE
  # -------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # -------------------------
  # 2. BUILD & PUSH STAGE
  # -------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: test # Depends on test stage passing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  # -------------------------
  # 3. DEPLOY TO EC2 STAGE
  # -------------------------
  deploy:
    name: Deploy to EC2
    needs: build-and-push # Depends on Docker push succeeding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Error handling: Stop script on any error
            set -e
            
            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app:latest
            
            # Stop and remove the existing container gracefully (ignore error if it doesn't exist)
            docker stop my-node-container || true
            docker rm my-node-container || true
            
            # Run the new container
            docker run -d --name my-node-container -p 80:3000 ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app:latest
            
            # Cleanup dangling images to save space
            docker image prune -f

  # -------------------------
  # 4. ERROR HANDLING STAGE
  # -------------------------
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: failure() # This job ONLY runs if any previous job in this workflow fails
    steps:
      - name: Send Alert
        run: |
          echo "::error::Pipeline failed! Please check the GitHub Actions logs."
          # In a real scenario, you can use curl to post to Slack, MS Teams, or Discord:
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"Deployment to EC2 Failed!"}' YOUR_WEBHOOK_URL
